<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You - A Cinematic Love Letter</title>
  <link rel="stylesheet" href="css/spiderverse.css" />
  <link rel="stylesheet" href="css/gallery.css" />
  <link rel="stylesheet" href="css/admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Permanent+Marker&family=Caveat:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- INTRO SPLASH -->
  <div id="splash-screen">
    <div class="splash-content">
      <div class="comic-burst">
        <h1 class="splash-title">For You</h1>
      </div>
      <p class="splash-subtitle">A Cinematic Love Letter</p>
      <button id="enter-btn" class="comic-btn">
        <span class="btn-text">Enter Our Universe</span>
        <span class="btn-dots"></span>
      </button>
    </div>
    <div class="halftone-overlay"></div>
    <div class="ink-splatter splat-1"></div>
    <div class="ink-splatter splat-2"></div>
    <div class="ink-splatter splat-3"></div>
  </div>

  <!-- AUDIO PLAYER -->
  <div id="audio-player">
    <button id="audio-toggle" class="audio-btn" title="Toggle Music">
      <svg id="audio-icon-on" class="audio-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
      </svg>
      <svg id="audio-icon-off" class="audio-icon hidden" viewBox="0 0 24 24" fill="currentColor">
        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
      </svg>
    </button>
    <div class="audio-visualizer">
      <span class="bar"></span><span class="bar"></span><span class="bar"></span>
      <span class="bar"></span><span class="bar"></span>
    </div>
  </div>

  <!-- NAV -->
  <nav id="main-nav" class="hidden">
    <div class="nav-inner">
      <a href="#" class="nav-logo" data-page="gallery">For You</a>
      <div class="nav-links">
        <a href="#" class="nav-link active" data-page="gallery">Gallery</a>
        <a href="#" class="nav-link" data-page="timeline">Timeline</a>
        <a href="#" class="nav-link" data-page="favorites">Favorites</a>
        <a href="#" class="nav-link admin-link" data-page="admin">Admin</a>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main id="main-content" class="hidden">

    <!-- GALLERY PAGE -->
    <section id="page-gallery" class="page active">
      <div class="page-header">
        <h2 class="section-title comic-text">Our Moments</h2>
        <p class="section-caption romantic-caption"></p>
      </div>
      <div id="gallery-grid" class="spiderverse-grid">
        <!-- Dynamic content -->
      </div>
    </section>

    <!-- TIMELINE PAGE -->
    <section id="page-timeline" class="page">
      <div class="page-header">
        <h2 class="section-title comic-text">Our Story</h2>
        <p class="section-caption romantic-caption"></p>
      </div>
      <div id="timeline-container" class="timeline">
        <!-- Dynamic content -->
      </div>
    </section>

    <!-- FAVORITES PAGE -->
    <section id="page-favorites" class="page">
      <div class="page-header">
        <h2 class="section-title comic-text">Favorite Frames</h2>
        <p class="section-caption romantic-caption"></p>
      </div>
      <div id="favorites-grid" class="spiderverse-grid">
        <!-- Dynamic content -->
      </div>
    </section>

    <!-- ADMIN PAGE -->
    <section id="page-admin" class="page">
      <div class="admin-container">
        <div class="admin-header">
          <h2 class="section-title comic-text">Mission Control</h2>
          <p class="admin-subtitle">Upload & manage your media</p>
        </div>

        <!-- Admin Auth -->
        <div id="admin-auth" class="admin-panel">
          <div class="auth-form">
            <h3>Enter Admin Code</h3>
            <input type="password" id="admin-password" placeholder="Password" class="comic-input" />
            <button id="admin-login-btn" class="comic-btn">Access</button>
          </div>
        </div>

        <!-- Admin Dashboard -->
        <div id="admin-dashboard" class="hidden">
          <!-- Upload Section -->
          <div class="admin-panel upload-panel">
            <h3 class="panel-title">Upload Media</h3>
            <div id="drop-zone" class="drop-zone">
              <div class="drop-zone-content">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
                <p>Drop photos & videos here</p>
                <span>or click to browse</span>
              </div>
              <input type="file" id="file-input" multiple accept="image/*,video/*" />
            </div>
            <div id="upload-preview" class="upload-preview"></div>

            <div class="upload-options">
              <div class="form-group">
                <label>Caption</label>
                <input type="text" id="media-caption" class="comic-input" placeholder="Add a caption..." />
              </div>
              <div class="form-group">
                <label>Date</label>
                <input type="date" id="media-date" class="comic-input" />
              </div>
              <div class="form-group">
                <label>
                  <input type="checkbox" id="media-favorite" /> Mark as Favorite
                </label>
              </div>
              <button id="upload-btn" class="comic-btn">Add to Gallery</button>
            </div>
          </div>

          <!-- Media Manager -->
          <div class="admin-panel">
            <h3 class="panel-title">Media Manager</h3>
            <div id="media-manager" class="media-manager-grid">
              <!-- Dynamic content -->
            </div>
          </div>

          <!-- Settings -->
          <div class="admin-panel">
            <h3 class="panel-title">Settings</h3>
            <div class="settings-group">
              <div class="form-group">
                <label>Admin Password</label>
                <input type="password" id="new-password" class="comic-input" placeholder="New password" />
                <button id="change-password-btn" class="comic-btn small">Update</button>
              </div>
              <div class="form-group">
                <label>Site Title</label>
                <input type="text" id="site-title" class="comic-input" placeholder="For You" />
                <button id="change-title-btn" class="comic-btn small">Update</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="lightbox hidden">
    <button class="lightbox-close">&times;</button>
    <button class="lightbox-prev">&lsaquo;</button>
    <button class="lightbox-next">&rsaquo;</button>
    <div class="lightbox-content">
      <div class="lightbox-media"></div>
      <div class="lightbox-caption"></div>
    </div>
    <div class="comic-frame-overlay"></div>
  </div>

  <!-- FLOATING COMIC ELEMENTS -->
  <div class="floating-elements hidden">
    <div class="comic-dot dot-1"></div>
    <div class="comic-dot dot-2"></div>
    <div class="comic-dot dot-3"></div>
    <div class="speed-line line-1"></div>
    <div class="speed-line line-2"></div>
  </div>

  <script src="js/captions.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/spiderverse.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
